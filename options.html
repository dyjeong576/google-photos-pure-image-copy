<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Pure Image Copy 설정</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main>
      <header class="page-header">
        <h1 id="heading">적용 사이트</h1>
        <p id="heading-description">이미지 복사 메뉴를 사용할 사이트를 관리합니다.</p>
      </header>

      <section class="card" aria-labelledby="settings-title">
        <div class="section-header">
          <h2 id="settings-title">사이트 설정</h2>
          <p id="settings-description">표시 언어를 선택하고 적용할 사이트 도메인을 추가하세요.</p>
        </div>
        <label id="language-field">
          <span id="language-label">언어</span>
          <select id="language-select"></select>
        </label>
        <label id="quality-field">
          <span id="quality-label">이미지 품질</span>
          <select id="quality-select"></select>
        </label>
        <form id="add-form">
          <label id="site-input-label" for="site-input">사이트 도메인</label>
          <div class="add-row">
            <input id="site-input" type="text" placeholder="example.com 또는 https://example.com" autocomplete="off">
            <button id="add-button" type="submit">추가</button>
          </div>
        </form>
        <p id="message" role="status"></p>
      </section>

      <section class="site-section" aria-labelledby="site-list-title">
        <div class="section-header">
          <h2 id="site-list-title">등록된 사이트</h2>
          <p id="site-list-description">체크박스로 사이트별 활성 상태를 변경할 수 있습니다.</p>
        </div>
        <p id="empty-state">아직 추가된 사이트가 없습니다.</p>
        <ul id="site-list"></ul>
      </section>
    </main>
    <script src="i18n.js"></script>
    <script src="options.js"></script>
  </body>
</html>
